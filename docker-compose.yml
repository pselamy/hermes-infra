services:
  reeve-agent:
    image: nousresearch/hermes-agent:latest
    container_name: reeve-agent
    command: ["gateway", "run"]
    restart: unless-stopped
    volumes:
      - /opt/hermes-data:/opt/data
      - ./config:/etc/hermes:ro
    env_file:
      - .env
    environment:
      - HERMES_CONFIG_PATH=/etc/hermes/hermes.yaml
    ports:
      - "127.0.0.1:8080:8080"
